---
apiVersion: v1
kind: ConfigMap
metadata:
  name: todo-config
  namespace: todo-app
data:
  DB_HOST: "postgres-service"
  DB_PORT: "5432"
  DB_NAME: "my_todo_db"
  DB_USER: "my_app_user"
  PORT: "5000"
  FRONTEND_URL: "http://frontend-service"

---
apiVersion: v1
kind: Secret
metadata:
  name: todo-secret
  namespace: todo-app
type: Opaque
# echo -n 'postgres123' | base64 => cG9zdGdyZXMxMjM=
data:
  DB_PASSWORD: MTIzNA==
  POSTGRES_PASSWORD: MTIzNA==
