name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Login DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/todo-app:${{ github.sha }} .

    - name: Push Image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/todo-app:${{ github.sha }}

    - name: Clone GitOps Repo
      run: |
        git clone https://x-access-token:${{ secrets.GITOPS_TOKEN }}@github.com/YOUR_GITHUB_USERNAME/gitops-cluster-config.git

    - name: Update Manifest
      run: |
        sed -i "s|image:.*|image: ${{ secrets.DOCKER_USERNAME }}/todo-app:${{ github.sha }}|g" \
        gitops-cluster-config/clusters/minikube/apps/todo-app/deployment.yaml

    - name: Commit Changes
      run: |
        cd gitops-cluster-config
        git config user.name github-actions
        git config user.email github-actions@github.com
        git add .
        git commit -m "Update image ${{ github.sha }}" || true
        git push