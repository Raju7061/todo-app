input {
  kafka {
    bootstrap_servers => "kafka:9092"
    topics => ["todo.public.todos"]
    codec => "json"
    auto_offset_reset => "earliest"
    group_id => "logstash-group"
  }
}

filter {
  # Sirf after field ka data extract karo (actual todo data)
  if [after] {
    mutate {
      add_field => {
        "title"       => "%{[after][title]}"
        "completed"   => "%{[after][completed]}"
        "priority"    => "%{[after][priority]}"
        "created_at"  => "%{[after][created_at]}"
        "updated_at"  => "%{[after][updated_at]}"
        "todo_id"     => "%{[after][id]}"
      }
    }
    # Operation type add karo (c=create, u=update, d=delete, r=read)
    mutate {
      add_field => { "operation" => "%{op}" }
    }
    # Unnecessary fields hatao
    mutate {
      remove_field => ["before", "after", "source", "transaction", "op", "ts_ms", "@version"]
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "todos"
    document_id => "%{todo_id}"
  }
  # Debugging ke liye — logs mein dikhega
  stdout { codec => rubydebug }
}
