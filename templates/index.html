<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Beautiful Todo App</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
        <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">My Tasks</h1>
        
        <div class="flex gap-2 mb-6">
            <input type="text" id="taskInput" placeholder="Add a new task..." 
                class="flex-1 border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            <button onclick="addTodo()" 
                class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition">Add</button>
        </div>

        <ul id="todoList" class="space-y-3">
            </ul>
    </div>

    <script>
        async function fetchTodos() {
            const response = await fetch('/todos');
            const data = await response.json();
            const list = document.getElementById('todoList');
            list.innerHTML = '';
            data.forEach(todo => {
                const li = document.createElement('li');
                li.className = "bg-gray-50 p-3 rounded-lg border border-gray-200 flex justify-between items-center";
                li.innerHTML = `<span>${todo.task}</span>`;
                list.appendChild(li);
            });
        }

        async function addTodo() {
            const input = document.getElementById('taskInput');
            if (!input.value) return;
            
            await fetch(`/add/${input.value}`, { method: 'POST' });
            input.value = '';
            fetchTodos();
        }

        fetchTodos();
    </script>
</body>
</html>
