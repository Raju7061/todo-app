version: '3.8'
services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: my_app_user
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: my_todo_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./server
    ports:
      - "5000:5000"
    environment:
      DB_HOST: db
      DB_USER: my_app_user
      DB_PASSWORD: 1234
      DB_NAME: my_todo_db
      DB_PORT: 5432
    depends_on:
      - db

  frontend:
    build: ./client
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:5000

volumes:
  postgres_data: